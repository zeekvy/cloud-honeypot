

services:

  db:
    image: mysql:8.0
    container_name: honeypot_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: honeypot_root
      MYSQL_DATABASE: honeypot_db
      MYSQL_USER: honeypot_user
      MYSQL_PASSWORD: honeypot_pass
    volumes:
      - db_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: honeypot_app
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_USER: honeypot_user
      DB_PASSWORD: honeypot_pass
      DB_NAME: honeypot_db
    expose:
      - "5000"

  nginx:
    image: nginx:alpine
    container_name: honeypot_nginx
    restart: always
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./templates/nginx/default.conf:/etc/nginx/conf.d/default.conf

volumes:
  db_data:
